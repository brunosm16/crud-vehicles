<div class="container">
  <div class="header">
    <h1>Veículos</h1>
    <button class="btn btn-primary" (click)="goToNew()">+ Novo Veículo</button>
  </div>

  <div *ngIf="loading" class="loading">Carregando...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <table *ngIf="!loading && vehicles.length > 0">
    <thead>
      <tr>
        <th>Placa</th>
        <th>Marca</th>
        <th>Modelo</th>
        <th>Ano</th>
        <th>Chassi</th>
        <th>Renavam</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let vehicle of vehicles">
        <td>{{ vehicle.placa }}</td>
        <td>{{ vehicle.marca }}</td>
        <td>{{ vehicle.modelo }}</td>
        <td>{{ vehicle.ano }}</td>
        <td>{{ vehicle.chassi }}</td>
        <td>{{ vehicle.renavam }}</td>
        <td class="actions">
          <button class="btn btn-secondary" (click)="edit(vehicle.id)">
            Editar
          </button>
          <button class="btn btn-danger" (click)="delete(vehicle.id)">
            Excluir
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="!loading && vehicles.length === 0 && !error">
    Nenhum veículo cadastrado.
  </p>
</div>
