packages:
  - packages/*
allowBuilds:
  '3': true
  ',': true
  '-': true
  /: true
  '@': true
  b: true
  c: true
  d: true
  e: true
  i: true
  j: true
  l: true
  n: true
  o: true
  q: true
  r: true
  s: true
  t: true
  u: true

catalogs:
  peer:
    '@types/node': '^25.5.2'
    'typescript': '^5.8.3'

engineStrict: true
publicHoistPattern:
  - '@eslint/*'
  - '@vitest/*'
  - 'globals'
